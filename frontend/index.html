  <title>ClubGamer</title>
  
  <!-- Inline CSS para loading spinner y optimizaciones iniciales -->
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Fuente base */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #f8fafc;
      color: #1a202c;
      line-height: 1.6;
    }

    /* Loading spinner mientras carga React */
    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .loading-text {
      color: white;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
    }

    .loading-subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      margin-top: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Fade out animation cuando React toma control */
    .loading-container.fade-out {
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }

    /* No-script fallback */
    .no-script-message {
      background: #fee;
      border: 1px solid #fcc;
      color: #a00;
      padding: 20px;
      margin: 20px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
    }

    /* Estilos para desarrollo */
    .development-banner {
      background: linear-gradient(90deg, #ff6b6b, #ee5a24);
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      display: none;
    }

    /* Show development banner only in development */
    body[data-env="development"] .development-banner {
      display: block;
    }

    body[data-env="development"] #root {
      margin-top: 32px;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
